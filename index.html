<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para el amor de mi vida ❤️</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#ff4d6d,#ff8fab);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
}

.caja{
    background:rgba(255,255,255,0.15);
    padding:30px;
    border-radius:20px;
    width:85%;
    max-width:400px;
}

button{
    background:white;
    color:#ff4d6d;
    border:none;
    padding:15px 25px;
    font-size:18px;
    border-radius:12px;
    cursor:pointer;
    margin-top:20px;
}

#mensaje{
    display:none;
    margin-top:25px;
    font-size:22px;
}
</style>
</head>

<body>

<div class="caja">
<h1>❤️ Tengo una sorpresa para ti ❤️</h1>

<p>Pulsa el botón...</p>

<button onclick="mostrar()">
Abrir sorpresa 🎁
</button>

<div id="mensaje">
<h2>Te amo muchísimo ❤️</h2>

<p>
Gracias por estar en mi vida.<br><br>
Eres la persona más importante para mí.<br><br>
Prometo seguir haciéndote sonreír cada día.<br><br>

✨ Feliz cumpleaños, mi amor. ✨
</p>

<h1>💖🥹🌹</h1>
</div>
</div>

<script>
function mostrar(){
document.getElementById("mensaje").style.display="block";
}
</script>

</body>
</html>
